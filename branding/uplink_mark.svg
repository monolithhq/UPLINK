<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- UPLINK primary mark — "operator frame"
       Four corner brackets (proportions match CornerBracketFrame.kt:
       bracket length ~16% of frame span, corner-anchored right angles)
       framing a central U built from a continuous signal path, with
       a single upward tick + dot indicating transmission.
       No gradients. Palette: UplinkVoid / UplinkSignal / UplinkSignalDim only. -->

  <rect width="512" height="512" fill="#08090C"/>

  <!-- Corner brackets: frame spans 96,96 to 416,416 (320x320), bracket arm = 52 (~16% of span) -->
  <g stroke="#0DF2C4" stroke-width="14" fill="none" stroke-linecap="square">
    <!-- top-left -->
    <path d="M 96 148 L 96 96 L 148 96"/>
    <!-- top-right -->
    <path d="M 416 148 L 416 96 L 364 96"/>
    <!-- bottom-left -->
    <path d="M 96 364 L 96 416 L 148 416"/>
    <!-- bottom-right -->
    <path d="M 416 364 L 416 416 L 364 416"/>
  </g>

  <!-- Central U: continuous signal path, single stroke, square terminals -->
  <path d="M 206 190 L 206 300 Q 206 328 234 328 L 278 328 Q 306 328 306 300 L 306 190"
        stroke="#0DF2C4" stroke-width="22" fill="none" stroke-linecap="square"/>

  <!-- Upward signal tick + dot, rising off the U's right leg -->
  <line x1="306" y1="190" x2="332" y2="150" stroke="#0DF2C4" stroke-width="14" stroke-linecap="square"/>
  <circle cx="332" cy="150" r="9" fill="#0DF2C4"/>

  <!-- Secondary stroke accent: faint echo arc behind the tick, dim signal color -->
  <path d="M 316 168 Q 332 142 350 158" stroke="#0A9C84" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
