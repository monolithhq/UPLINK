<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- UPLINK primary mark — "operator frame", REVISED (001.5.2)
       Four corner brackets, central U, and two signal-emission arcs
       sitting in the frame's open upper-right quadrant.

       Design correction from 001.5.1: arcs are NOT mathematically
       attached to the U's stroke endpoint. That approach either
       produced a pin-like dot/stem (001 original) or over-constrained
       geometry with no clean solution (001.5.1 first attempt). Per
       revised spec: the signal only needs to visually belong to the
       U, not physically touch it — arcs read as broadcast emission
       via proximity and negative space, not attachment.

       Geometry:
       - no dot, no connector stem, no isolated single element
       - exactly 2 open arcs, inner smaller/closer, outer larger/offset
       - arcs occupy the frame's empty upper-right pocket, clear of
         both the U and the corner bracket
       No gradients. Palette: UplinkVoid / UplinkSignal / UplinkSignalDim only. -->

  <rect width="512" height="512" fill="#08090C"/>

  <!-- Corner brackets: frame spans 90,90 to 422,422, bracket arm = 53 -->
  <g stroke="#0DF2C4" stroke-width="14" fill="none" stroke-linecap="square">
    <path d="M 90 143 L 90 90 L 143 90"/>
    <path d="M 422 143 L 422 90 L 369 90"/>
    <path d="M 90 369 L 90 422 L 143 422"/>
    <path d="M 422 369 L 422 422 L 369 422"/>
  </g>

  <!-- Central U: continuous signal path, single stroke, square terminals.
       Centered, width ~130 (x 191–321), stroke 22. -->
  <path d="M 191 195 L 191 300 Q 191 328 219 328 L 293 328 Q 321 328 321 300 L 321 195"
        stroke="#0DF2C4" stroke-width="22" fill="none" stroke-linecap="square"/>

  <!-- Signal arcs: two open concentric-feeling rings in the frame's
       upper-right pocket, sharing a virtual center at (325,145) but
       not touching the U or the bracket. Inner arc nearer/brighter,
       outer arc offset further up-right and dimmer (propagation read). -->
  <path d="M 292.1 133.0 A 35 35 0 0 1 342.5 114.7"
        stroke="#0DF2C4" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M 273.3 126.2 A 55 55 0 0 1 352.5 97.4"
        stroke="#0A9C84" stroke-width="18" fill="none" stroke-linecap="round"/>

</svg>
