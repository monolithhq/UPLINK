<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <!-- Combined lockup for GitHub README header / release pages.
       Mark on the left, wordmark on the right, vertically centered. -->

  <rect width="900" height="220" fill="#08090C"/>

  <!-- Mark, scaled down and repositioned from uplink_mark.svg (512x512 -> 180x180, offset 20,20) -->
  <g transform="translate(20, 20) scale(0.3515625)">
    <g stroke="#0DF2C4" stroke-width="14" fill="none" stroke-linecap="square">
      <path d="M 96 148 L 96 96 L 148 96"/>
      <path d="M 416 148 L 416 96 L 364 96"/>
      <path d="M 96 364 L 96 416 L 148 416"/>
      <path d="M 416 364 L 416 416 L 364 416"/>
    </g>
    <path d="M 206 190 L 206 300 Q 206 328 234 328 L 278 328 Q 306 328 306 300 L 306 190"
          stroke="#0DF2C4" stroke-width="22" fill="none" stroke-linecap="square"/>
    <line x1="306" y1="190" x2="332" y2="150" stroke="#0DF2C4" stroke-width="14" stroke-linecap="square"/>
    <circle cx="332" cy="150" r="9" fill="#0DF2C4"/>
    <path d="M 316 168 Q 332 142 350 158" stroke="#0A9C84" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <text x="260" y="130"
        font-family="'JetBrains Mono', 'Roboto Mono', 'Courier New', monospace"
        font-size="64"
        font-weight="600"
        letter-spacing="12"
        fill="#0DF2C4"
        dominant-baseline="middle">UPLINK</text>

  <!-- tagline, dim text, under the wordmark -->
  <text x="262" y="168"
        font-family="'JetBrains Mono', 'Roboto Mono', 'Courier New', monospace"
        font-size="20"
        letter-spacing="4"
        fill="#8890A0">BROADCAST TERMINAL</text>
</svg>
